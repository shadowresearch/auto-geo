# Jekyll configuration for the auto-geo docs site on GitHub Pages.
#
# Served from the `docs/` directory on the `main` branch (Settings →
# Pages → Source: "Deploy from a branch" → main → /docs).
#
# Theme: just-the-docs via remote_theme — the standard Jekyll
# documentation theme (sidebar navigation, built-in search, clean
# typography), GitHub Pages compatible with zero build pipeline.
# Per-page customizations (LLM-friendly head links, JSON-LD) live in
# `docs/_includes/head_custom.html`, the theme's supported hook.

title: auto-geo
description: >-
  The open-source GEO engine that gets your brand mentioned in ChatGPT, Claude, Gemini, Perplexity, and Grok.
  Audit, generate, fix, and track the pages large language models cite.
  Open-source (MIT), built by Shadow.
url: https://shadowresearch.github.io
baseurl: /auto-geo

repository: shadowresearch/auto-geo

remote_theme: just-the-docs/just-the-docs

# ── just-the-docs ──────────────────────────────────────────────────

color_scheme: light
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  rel_url: true
  button: false

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  GitHub: https://github.com/shadowresearch/auto-geo
  npm: https://www.npmjs.com/package/auto-geo
aux_links_new_tab: true

nav_external_links:
  - title: Shadow
    url: https://www.shadow.inc

footer_content: >-
  Copyright &copy; Shadow (<a href="https://www.shadow.inc">shadow.inc</a>).
  Distributed under the
  <a href="https://github.com/shadowresearch/auto-geo/blob/main/LICENSE">MIT license</a>.
  This site is LLM-friendly:
  <a href="/auto-geo/llms.txt">llms.txt</a> &middot;
  <a href="/auto-geo/llms-full.txt">llms-full.txt</a>.

# Site-wide author for JSON-LD (see _includes/head_custom.html).
author:
  name: Shadow
  url: https://www.shadow.inc

# Resource URLs surfaced in every page's <head>.
llms_txt: /auto-geo/llms.txt
llms_full_txt: /auto-geo/llms-full.txt
npm_url: https://www.npmjs.com/package/auto-geo
repo_url: https://github.com/shadowresearch/auto-geo

exclude:
  - README.md
  - "*.sql"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalinks: keep them aligned with the file path so existing GitHub
# links into the repo (/docs/sop.md → /auto-geo/sop) still resolve when
# the same files are also served as Pages.
permalink: /:basename

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# jekyll-relative-links rewrites `./foo.md` → `./foo` so the in-repo links
# in our docs continue to work on the Pages site.
relative_links:
  enabled: true
  collections: true
