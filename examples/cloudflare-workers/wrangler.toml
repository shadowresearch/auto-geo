name = "auto-geo-example"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Set the publish token as a secret with:
#   wrangler secret put GEO_PUBLISH_TOKEN
#
# For local dev, put it in a .dev.vars file at the repo root:
#   GEO_PUBLISH_TOKEN=your-token-here

# To use Cloudflare KV for storage instead of the in-memory store, bind it
# here and swap createMemoryStore for a KV-backed ContentStore in src/index.ts.
#
# [[kv_namespaces]]
# binding = "GEO_KV"
# id = "your-kv-namespace-id"
