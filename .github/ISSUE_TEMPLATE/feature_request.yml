name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, please read [CONTRIBUTING.md](https://github.com/shadowresearch/auto-geo/blob/main/CONTRIBUTING.md) — particularly the "what we generally do not accept" section, which covers schema loosening, markdown parsing, and breaking changes to the `ContentStore` interface.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe the underlying need, not the feature you want. The clearer the problem, the better the solution.
    validations:
      required: true

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API
      description: How would you expect the feature to work? Be concrete — API shape, file location, function signature, integration points with existing pipelines.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you'd recommend this one.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: false
      options:
        - New optional schema field
        - New content block type
        - New storage adapter
        - New HTTP adapter
        - New framework integration (renderer)
        - MCP tool enhancement
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: Willingness to PR
      description: Are you willing to contribute the implementation if the proposal is accepted?
      multiple: false
      options:
        - Yes — I'll open the PR
        - Yes — with guidance from a maintainer
        - No — I'm only reporting the need
    validations:
      required: true
