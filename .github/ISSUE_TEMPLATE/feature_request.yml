name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, please read CONTRIBUTING.md — particularly the "what we generally do not accept" section, which covers schema loosening, markdown parsing, and breaking changes to the ContentStore interface.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not the feature you want. The clearer the problem, the better the solution.
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: What you've tried today
      description: How do you handle this without the requested feature? Why doesn't it work?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you expect the feature to work? Be concrete — API shape, file location, integration points with existing pipelines.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: false
      options:
        - New optional schema field
        - New content block type
        - New storage adapter
        - New HTTP adapter
        - New framework integration (renderer)
        - MCP tool enhancement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you'd recommend this one.
