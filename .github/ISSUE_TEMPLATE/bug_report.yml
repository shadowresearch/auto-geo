name: Bug report
description: Report a bug in auto-geo
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in every section so we can reproduce and triage quickly. For security issues, use [SECURITY.md](https://github.com/shadowresearch/auto-geo/blob/main/SECURITY.md) instead — do not file a public issue.

  - type: input
    id: version
    attributes:
      label: auto-geo version
      description: From your `package.json` or `pnpm-lock.yaml`.
      placeholder: "0.1.1"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      multiple: false
      options:
        - Node.js
        - Bun
        - Deno
        - Vercel Functions
        - Cloudflare Workers
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      description: e.g. `Node 22.5.1`, `Bun 1.2.0`, `Deno 2.0.0`.
      placeholder: "Node 22.5.1"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework / HTTP adapter
      multiple: false
      options:
        - Next.js (App Router)
        - Next.js (Pages Router)
        - Hono
        - Express
        - Fastify
        - Elysia
        - Direct `runPublish` call (no adapter)
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - schema (core/schema.ts)
        - validation (core/validation.ts)
        - publish pipeline (core/publish.ts)
        - jsonld (core/jsonld.ts)
        - storage adapter (KV / Supabase / memory)
        - HTTP adapter (Next.js / Hono)
        - React renderer (components/react)
        - MCP server (mcp/)
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: A payload, code snippet, or curl command that triggers the bug. The smaller the better — minimal repros get fixed first.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste the full error message, stack trace, or unexpected response body. Rendered as a code block.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — related issues, workarounds you tried, links to a public repro repo.
