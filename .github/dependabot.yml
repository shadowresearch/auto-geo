version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      types:
        patterns:
          - "@types/*"
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: "/mcp"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - mcp
    commit-message:
      prefix: chore(mcp)

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
